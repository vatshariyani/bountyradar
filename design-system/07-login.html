<!DOCTYPE html>
<html lang="en">
<head><meta charset="utf-8"/><meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Bounty Radar — Login</title>
<style>
  body{margin:0;background:#0A0E13;font-family:'Inter',system-ui,Segoe UI,Roboto,sans-serif}
  .screen{max-width:360px;margin:0 auto;padding:40px 28px;background:
    radial-gradient(700px 300px at 10% 0%, rgba(31,224,160,.12), transparent),
    radial-gradient(700px 400px at 100% 100%, rgba(139,123,255,.12), transparent);
    display:flex;flex-direction:column;align-items:center;color:#E6EDF3;border-radius:24px}
  .logo{width:86px;height:86px;border-radius:26px;background:linear-gradient(135deg,#1FE0A0,#8B7BFF);display:grid;place-items:center;font-size:42px;color:#05130D}
  h1{font-weight:900;font-size:28px;margin:18px 0 2px}
  .sub{color:#9FB0C0;font-size:13px;margin:0 0 24px;text-align:center}
  .field{width:100%;box-sizing:border-box;background:#11161E;border:1px solid #2C3946;border-radius:16px;padding:15px;color:#9FB0C0;font-size:14px;margin-bottom:12px}
  .btn{width:100%;box-sizing:border-box;background:#1FE0A0;color:#05130D;font-weight:800;font-size:15px;padding:16px;border:0;border-radius:16px}
  .link{color:#35D0FF;font-size:13px;margin-top:14px}
</style></head>
<body>
  <div class="screen">
    <div class="logo">&#128225;</div>
    <h1>BountyRadar</h1>
    <p class="sub">Be first to every new bug bounty target.</p>
    <div class="field">Email</div>
    <div class="field">Password</div>
    <button class="btn">Sign in</button>
    <div class="link">New here? Create an account</div>
  </div>
</body>
</html>
