<!DOCTYPE html>
<html lang="en">
<head><meta charset="utf-8"/><meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Bounty Radar — Badges &amp; pills</title>
<style>
  body{margin:0;background:#0A0E13;color:#E6EDF3;padding:28px;font-family:'Inter',system-ui,Segoe UI,Roboto,sans-serif}
  h1{font-size:18px;font-weight:800;margin:0 0 4px}
  h2{font-size:11px;letter-spacing:.08em;text-transform:uppercase;color:#9FB0C0;margin:22px 0 10px}
  .row{display:flex;gap:10px;flex-wrap:wrap;align-items:center}
  .badge{font-size:11px;font-weight:900;padding:3px 9px;border-radius:999px}
  .new{background:#1FE0A0;color:#05130D}
  .upd{background:#8B7BFF;color:#fff}
  .pill{font-size:12px;font-weight:600;padding:4px 12px;border-radius:999px;border:1px solid}
  .pay{color:#1FE0A0;border-color:rgba(31,224,160,.5);background:rgba(31,224,160,.16)}
  .scope{color:#35D0FF;border-color:rgba(53,208,255,.5)}
  .web3{color:#8B7BFF;border-color:rgba(139,123,255,.5)}
  .vdp{color:#9FB0C0;border-color:#2C3946}
  .amber{color:#FFC24B;border-color:rgba(255,194,75,.5)}
</style></head>
<body>
  <h1>Badges &amp; pills</h1>
  <h2>Status badges</h2>
  <div class="row">
    <span class="badge new">NEW</span>
    <span class="badge upd">UPDATED</span>
    <span style="color:#9FB0C0;font-size:12px">NEW pulses softly; UPDATED appears when an existing program changes.</span>
  </div>
  <h2>Reward &amp; type pills</h2>
  <div class="row">
    <span class="pill pay">$100–$10,000</span>
    <span class="pill pay">up to $505,000</span>
    <span class="pill vdp">VDP</span>
    <span class="pill scope">19 scope</span>
    <span class="pill web3">web3</span>
    <span class="pill amber">audit-contest</span>
  </div>
</body>
</html>
