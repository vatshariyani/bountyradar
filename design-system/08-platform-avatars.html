<!DOCTYPE html>
<html lang="en">
<head><meta charset="utf-8"/><meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Bounty Radar — Platform avatars</title>
<style>
  body{margin:0;background:#0A0E13;color:#E6EDF3;padding:28px;font-family:'Inter',system-ui,Segoe UI,Roboto,sans-serif}
  h1{font-size:18px;font-weight:800;margin:0 0 14px}
  .grid{display:flex;gap:14px;flex-wrap:wrap}
  .pf{display:flex;flex-direction:column;align-items:center;gap:6px;font-size:11px;color:#9FB0C0;width:84px}
  .av{width:48px;height:48px;border-radius:16px;display:grid;place-items:center;color:#fff;font-weight:900;font-size:20px}
</style></head>
<body>
  <h1>Platform avatars</h1>
  <div class="grid">
    <div class="pf"><div class="av" style="background:linear-gradient(135deg,#3FA9F5,rgba(63,169,245,.6))">H</div>HackerOne</div>
    <div class="pf"><div class="av" style="background:linear-gradient(135deg,#FF7A59,rgba(255,122,89,.6))">B</div>Bugcrowd</div>
    <div class="pf"><div class="av" style="background:linear-gradient(135deg,#6C5CE7,rgba(108,92,231,.6))">I</div>Intigriti</div>
    <div class="pf"><div class="av" style="background:linear-gradient(135deg,#18C29C,rgba(24,194,156,.6))">Y</div>YesWeHack</div>
    <div class="pf"><div class="av" style="background:linear-gradient(135deg,#B388FF,rgba(179,136,255,.6))">I</div>Immunefi</div>
    <div class="pf"><div class="av" style="background:linear-gradient(135deg,#FF5DA2,rgba(255,93,162,.6))">S</div>Sherlock</div>
    <div class="pf"><div class="av" style="background:linear-gradient(135deg,#FFC24B,rgba(255,194,75,.6))">C</div>Cantina</div>
    <div class="pf"><div class="av" style="background:linear-gradient(135deg,#4DD0E1,rgba(77,208,225,.6))">F</div>Federacy</div>
  </div>
  <p style="color:#9FB0C0;font-size:12px;margin-top:16px;max-width:460px;line-height:1.5">Rounded-square monograms generated from the platform name, each on its own brand-accent gradient. Used in cards, the platforms grid and the program detail header.</p>
</body>
</html>
