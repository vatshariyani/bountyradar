name: Build APK

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'android/**'
      - '.github/workflows/build-apk.yml'

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Write google-services.json (from secret)
        env:
          GS: ${{ secrets.GOOGLE_SERVICES_JSON }}
        run: |
          if [ -z "$GS" ]; then
            echo "::error::GOOGLE_SERVICES_JSON secret is not set. Register the Android app in Firebase (package com.bountyradar.app), then add the base64 of google-services.json as that secret."
            exit 1
          fi
          echo "$GS" | base64 -d > android/app/google-services.json
          echo "Wrote android/app/google-services.json ($(wc -c < android/app/google-services.json) bytes)"

      - name: Build debug APK
        working-directory: android
        run: |
          gradle wrapper --gradle-version 8.9 --no-daemon
          ./gradlew :app:assembleDebug --no-daemon --stacktrace

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: bountyradar-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
